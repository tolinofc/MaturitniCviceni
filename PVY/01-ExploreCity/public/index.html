<!doctype html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ExploreCity</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
    <h1>ExploreCity</h1>
    <h2>..prozkoumej svět</h2>
</header>
<main>
    <section class="cities"></section>
    <section class="city-detail"></section>
</main>

<template id="city-template">
    <div class="city">
        <img>
        <p class="city-name"></p>
    </div>
</template>

<template id="place-template">
    <div class="place">
        <img class="place-image-click">
        <p class="place-name"></p>
        <p class="place-type"></p>
        <div class="place-actions">
            <button class="btn-edit-place">Upravit</button>
            <button class="btn-delete-place">Smazat</button>
        </div>
    </div>
</template>

<template id="place-detail-template">
    <section class="place-detail">
        <div class="place-header">
            <div class="place-name-wrapper">
                <h1 class="place-title"></h1>
                <div class="btn-close">❌</div>
            </div>
            <div class="rating"></div>
        </div>
        <div class="place-info">
            <img>
            <div>
                <p class="place-description"></p>
                <p class="place-address"></p>
            </div>
        </div>
        <div class="comments"></div>

        <div class="new-comment">
            <h3>Nový komentář</h3>
            <input type="text" placeholder="Jméno" class="input-name" required>
            <input type="text" placeholder="Text komentáře" class="input-text" required>
            <button class="btn-send">Odeslat</button>
        </div>
    </section>
</template>

<template id="comment-template">
    <div class="comment">
        <div class="comment-icon">🙍‍♂️</div>
        <div>
            <div class="comment-info">
                <div class="person-info">
                    <p class="person-name"></p>
                    <p class="person-date"></p>
                </div>
                <div class="btn-delete-comment">❌</div>
            </div>
            <p class="comment-text"></p>
        </div>
    </div>
</template>

<template id="place-form-template">
    <div class="new-place-form">
        <h3 class="form-title">Nové místo</h3>
        <select class="input-type" required>
        </select>
        <input type="text" class="input-place-name" placeholder="Název" required>
        <textarea class="input-desc" placeholder="Popis"></textarea>
        <input type="text" class="input-address" placeholder="Adresa">
        <input type="text" class="input-image" placeholder="Obrázek">
        <div class="form-actions">
            <button class="btn-save">Uložit</button>
            <button class="btn-cancel hidden">Zrušit</button>
        </div>
    </div>
</template>

<script src="script.js"></script>
</body>
</html>
